# PDF ingestion Directory Configuration
pdf.ingestion.directory=/Users/ling-senpeng/Documents/Legal Test Data/25FL161157

# NOTE: File size limits have been removed (Phase 11 OCR Integration)
# All PDF files, regardless of size, are now processed
# Large PDFs are handled via OCR thread pool limits and timeouts
# (Archived for reference: max.file.size was previously set to 1048576 bytes / 1MB)

# OCR Provider Configuration (Phase 12 - PaddleOCR Integration)
# Options: "paddle", "tesseract", "auto" (auto-detect best available)
# Default: "auto" - will use PaddleOCR if available, fall back to Tesseract
# Set to "paddle" to force PaddleOCR (requires Python + paddleocr package)
# Set to "tesseract" to force Tesseract (system binary required)
ocr.provider=auto

# Database Configuration
db.enabled=true
db.url=jdbc:postgresql://localhost:5432/legal_ingestion
db.user=ingestion_user
db.password=ingestion_pass

# Vector Search / Embeddings Configuration
embeddings.enabled=true
embeddings.model=text-embedding-3-small
# IMPORTANT: OpenAI API key should be set via environment variable:
#   export OPENAI_API_KEY="sk-..."
# For embed-missing and search commands

# Application Settings
parallelism=1