version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: legal-injestion-db
    environment:
      POSTGRES_USER: injestion_user
      POSTGRES_PASSWORD: injestion_pass
      POSTGRES_DB: legal_injestion
    ports:
      - "5432:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U injestion_user"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
